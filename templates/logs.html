<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Logs</title>
</head>
<body>
    <h1>Booking Logs</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Table Number</th>
                <th>User Name</th>
                <th>User Email</th>
                <th>Duration (minutes)</th>
                <th>Amount Paid</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td>{{ log.timestamp }}</td>
                <td>{{ log.table_number }}</td>
                <td>{{ log.user_name }}</td>
                <td>{{ log.user_email }}</td>
                <td>{{ log.duration_minutes }}</td>
                <td>${{ log.amount_paid }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
