<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Table</title>
</head>
<body>
    <h1>Book a Table</h1>
    <form id="bookingForm">
        <label for="table_id">Table ID:</label>
        <input type="number" id="table_id" name="table_id" required><br>
        <label for="duration">Duration (minutes):</label>
        <input type="number" id="duration" name="duration" required><br>
        <label for="user_name">Name:</label>
        <input type="text" id="user_name" name="user_name" required><br>
        <label for="user_email">Email:</label>
        <input type="email" id="user_email" name="user_email" required><br>
        <button type="button" onclick="submitBooking()">Book</button>
    </form>

    <script>
        async function submitBooking() {
            const form = document.getElementById('bookingForm');
            const data = {
                table_id: form.table_id.value,
                duration: form.duration.value,
                user_name: form.user_name.value,
                user_email: form.user_email.value
            };

            const response = await fetch('/book', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            if (response.ok) {
                alert(`Booking successful! Booking ID: ${result.booking_id}, Amount: $${result.amount}`);
            } else {
                alert(`Error: ${result.error}`);
            }
        }
    </script>
</body>
</html>
